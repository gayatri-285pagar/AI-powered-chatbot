
<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: #f0f2f5;
        }

        /* Sidebar */
        .sidebar {
            width: 28%;
            background: #075e54;
            color: white;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .sidebar p {
            color: #dcdcdc;
            line-height: 1.6;
        }

        .feature-box {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .feature-box li {
            margin: 8px 0;
        }

        .sidebar-footer {
            font-size: 12px;
            color: #cccccc;
        }

        /* Chat Side */
        .chat-wrapper {
            width: 72%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 420px;
            height: 620px;
            background: #ffffff;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .chat-box {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user {
            background: #dcf8c6;
            align-self: flex-end;
        }

        .bot {
            background: #f1f0f0;
            align-self: flex-start;
        }

        .input-box {
            display: flex;
            padding: 10px;
            background: #eee;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        button {
            margin-left: 10px;
            padding: 10px;
            background: #075e54;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #128c7e;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">

    <div>
        <h1>🤖 AI Chatbot</h1>
        <p>Your smart assistant for study, coding and daily help.</p>

        <div class="feature-box">
            <p><b>✨ Features</b></p>
            <ul>
                <li>⚡ Instant answers</li>
                <li>📚 Study help</li>
                <li>💻 Coding support</li>
            </ul>
        </div>
    </div>

    <div class="sidebar-footer">
        Built using Java + Spring Boot 🚀
    </div>

</div>

<!-- Chat Section -->
<div class="chat-wrapper">
    <div class="chat-container">

        <div class="chat-header">
            AI Chatbot
        </div>

        <div id="chatBox" class="chat-box"></div>

        <div class="input-box">
            <input type="text" id="message" placeholder="Type a message..." />
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>
</div>

<script>
    function addMessage(text, type) {
        let chatBox = document.getElementById("chatBox");

        let msg = document.createElement("div");
        msg.classList.add("message", type);
        msg.innerText = text;

        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendMessage() {
        let input = document.getElementById("message");
        let msg = input.value;

        if (msg.trim() === "") return;

        addMessage(msg, "user");
        input.value = "";

        addMessage("Typing...", "bot");

        fetch("http://localhost:8080/api/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: msg })
        })
        .then(res => res.json())
        .then(data => {
            let chatBox = document.getElementById("chatBox");
            chatBox.lastChild.remove();
            addMessage(data.reply, "bot");
        })
        .catch(() => {
            addMessage("Error connecting to server", "bot");
        });
    }
</script>

</body>
</html>
